[project]
name = "video-recipe"
version = "1.3.0"
description = "Reverse-engineer AI-generated videos into reproducible recipes."
requires-python = ">=3.11"
# Upper bounds prevent silent breakage on major-version drift.
# Bump intentionally when we want to upgrade.
dependencies = [
    "yt-dlp>=2024.10.0,<2027",
    "scenedetect>=0.6.3,<0.8",
    "opencv-python-headless>=4.10,<5",
    "ffmpeg-python>=0.2.0,<1",
    "jsonschema>=4.20,<5",
    "openai-whisper>=20231117",
    "Pillow>=10.0,<12",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0,<9",
    "ruff>=0.6.0,<1",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["scripts*"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.pytest.ini_options]
testpaths = ["tests"]
