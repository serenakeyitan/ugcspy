name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
      - run: bun run build

      # Python-side: pure-compute tests that don't need scenedetect / opencv /
      # whisper. These guard the recipe-contract boundary between compose and
      # assemble_recipe (issue #12) and other JSON shape invariants.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install "pytest>=8.0,<9"
      - run: cd vendor/video-recipe && python -m pytest tests/test_compose.py -v
