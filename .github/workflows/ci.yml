name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
      - run: bun run build

      # Packaging guard: the npm tarball must ship the Python bridge (scripts/)
      # alongside dist/, or the published tiktok-oss provider + install-deps are
      # dead on arrival. Fails if the package.json "files" array regresses.
      - run: npm pack --dry-run 2>&1 | grep -q tiktok_fetch.py

      # Python-side: pure-compute tests that don't need scenedetect / opencv /
      # whisper. These guard the recipe-contract boundary between compose and
      # assemble_recipe (issue #12) and other JSON shape invariants.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install "pytest>=8.0,<9"
      - run: cd vendor/video-recipe && python -m pytest tests/test_compose.py -v

      # Bridge unit tests: guard the tikwm adapter, wide discovery, caption-
      # truncation rescue, and merge logic in scripts/tiktok_fetch.py. These are
      # stdlib-only (TikTokApi import is deferred), so no venv is needed.
      - run: python -m pytest test/ -v
